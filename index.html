<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Barber UA — Colorist PRO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#bb86fc">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #bb86fc;
            --danger: #ff4b2b;
            --text: #e0e0e0;
            --text-dim: #888;
            --radius: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
            line-height: 1.4;
        }

        h1 { font-size: 1.5em; text-align: center; color: var(--accent); margin-bottom: 24px; }
        .block-title { font-size: 1.1em; font-weight: 700; margin: 20px 0 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 4px; }

        .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; border: 1px solid #2a2a2a; }
        .label { display: block; font-size: 0.9em; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }

        select {
            width: 100%;
            background: #252525;
            color: #fff;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 8px;
            font-size: 1em;
            appearance: none;
            margin-bottom: 12px;
        }

        .rg { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; margin-bottom: 12px; }
        .rb {
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 4px;
            text-align: center;
            font-size: 0.9em;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }
        .rb input { display: none; }
        .rb:has(input:checked) { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

        .btn-danger {
            background: var(--danger);
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 1.1em;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.3);
            margin-top: 20px;
            text-transform: uppercase;
        }

        #resultContainer { margin-top: 24px; }
        
        /* Матрьошка Styles */
        details { background: #1e1e1e; border: 1px solid #333; border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
        summary { padding: 14px; cursor: pointer; font-weight: 700; font-size: 1.05em; display: flex; align-items: center; justify-content: space-between; outline: none; }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '▼'; font-size: 0.8em; color: var(--accent); transition: 0.3s; }
        details[open] summary::after { transform: rotate(180deg); }
        .phase-content { padding: 12px; border-top: 1px solid #333; }
        
        .step-card { background: #141414; border-left: 4px solid var(--accent); padding: 12px; margin-bottom: 10px; border-radius: 0 8px 8px 0; }
        .step-name { font-weight: 700; color: #fff; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .step-action { color: #e0e0e0; font-size: 0.95em; }
        .step-reason { cursor: pointer; background: var(--accent); color: #000; border-radius: 12px; padding: 2px 8px; font-size: 0.8em; font-weight: 800; }
        
        .warning-box { background: rgba(255, 75, 43, 0.1); border: 1px solid var(--danger); color: #ffbaba; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h1>COLORIST PRO</h1>

    <form id="F">
        <div class="block-title">БЛОК 1: СТРУКТУРА</div>
        
        <div class="card">
            <span class="label">Історія волосся</span>
            <select name="history" id="history">
                <option value="чистые">Раніше не фарбоване / Натуральне</option>
                <option value="Натуральна">Натуральне (корінь)</option>
                <option value="Косметична">Косметична база (свіжа)</option>
                <option value="Косметична (накопичена)">Накопичена косметика (темна/побутова)</option>
                <option value="Прямий пігмент / Хна">Прямий пігмент / Хна / Метали</option>
            </select>

            <span class="label">Стан довжини</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="condition" value="Нормальні" checked>Нормальні</label>
                <label class="rb"><input type="radio" name="condition" value="Пористі">Пористі</label>
                <label class="rb"><input type="radio" name="condition" value="Склоподібні">Склоподібні</label>
            </div>

            <span class="label">Товщина</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="thickness" value="Тонкі">Тонкі</label>
                <label class="rb"><input type="radio" name="thickness" value="Середні" checked>Середні</label>
                <label class="rb"><input type="radio" name="thickness" value="Товсті">Товсті</label>
            </div>

            <span class="label">Густота</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="density" value="Рідкі">Рідкі</label>
                <label class="rb"><input type="radio" name="density" value="Середні" checked>Середні</label>
                <label class="rb"><input type="radio" name="density" value="Густі">Густі</label>
            </div>

            <span class="label">Довжина</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="length" value="Короткі">Короткі</label>
                <label class="rb"><input type="radio" name="length" value="Середні" checked>Середні</label>
                <label class="rb"><input type="radio" name="length" value="Довгі">Довгі</label>
                <label class="rb"><input type="radio" name="length" value="Дуже довгі">Дуже довгі</label>
            </div>

            <span class="label">Сивина (%)</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="grey" value="0" checked>0%</label>
                <label class="rb"><input type="radio" name="grey" value="20">10-30%</label>
                <label class="rb"><input type="radio" name="grey" value="50">40-60%</label>
                <label class="rb"><input type="radio" name="grey" value="80">70-100%</label>
            </div>

            <span class="label">Тип сивини</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="greyType" value="М'яка" checked>М'яка</label>
                <label class="rb"><input type="radio" name="greyType" value="Жорстка">Жорстка</label>
            </div>
        </div>

        <div class="block-title">БЛОК 2: ПОТОЧНА БАЗА</div>
        <div class="card">
            <span class="label">Рівень кореня (УГТ)</span>
            <div class="rg" style="grid-template-columns: repeat(5, 1fr);">
                <label class="rb"><input type="radio" name="rootLevel" value="1">1</label>
                <label class="rb"><input type="radio" name="rootLevel" value="2">2</label>
                <label class="rb"><input type="radio" name="rootLevel" value="3">3</label>
                <label class="rb"><input type="radio" name="rootLevel" value="4">4</label>
                <label class="rb"><input type="radio" name="rootLevel" value="5">5</label>
                <label class="rb"><input type="radio" name="rootLevel" value="6" checked>6</label>
                <label class="rb"><input type="radio" name="rootLevel" value="7">7</label>
                <label class="rb"><input type="radio" name="rootLevel" value="8">8</label>
                <label class="rb"><input type="radio" name="rootLevel" value="9">9</label>
                <label class="rb"><input type="radio" name="rootLevel" value="10">10</label>
            </div>

            <span class="label">Довжина відростання (см)</span>
            <div class="rg">
                <label class="rb"><input type="radio" name="rootLength" value="1" checked>&lt; 1.5 см</label>
                <label class="rb"><input type="radio" name="rootLength" value="2">1.5–2 см</label>
                <label class="rb"><input type="radio" name="rootLength" value="3">&gt; 2 см</label>
            </div>

            <span class="label">Рівень довжини (УГТ)</span>
            <div class="rg" style="grid-template-columns: repeat(5, 1fr);">
                <label class="rb"><input type="radio" name="lengthLevel" value="1">1</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="2">2</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="3">3</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="4">4</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="5">5</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="6">6</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="7" checked>7</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="8">8</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="9">9</label>
                <label class="rb"><input type="radio" name="lengthLevel" value="10">10</label>
            </div>

            <span class="label">Тип бази довжини</span>
            <select name="baseType" id="baseType">
                <option value="Натуральна">Натуральна (ФО - це УГТ)</option>
                <option value="Косметична" selected>Косметична (Фарбована)</option>
                <option value="Прямий пігмент / Хна">Прямий пігмент / Хна</option>
            </select>
        </div>

        <div class="block-title">БЛОК 3: ЦІЛЬ</div>
        <div class="card">
            <span class="label">Бажаний рівень</span>
            <div class="rg" style="grid-template-columns: repeat(6, 1fr);">
                <label class="rb"><input type="radio" name="targetLevel" value="1">1</label>
                <label class="rb"><input type="radio" name="targetLevel" value="2">2</label>
                <label class="rb"><input type="radio" name="targetLevel" value="3">3</label>
                <label class="rb"><input type="radio" name="targetLevel" value="4">4</label>
                <label class="rb"><input type="radio" name="targetLevel" value="5">5</label>
                <label class="rb"><input type="radio" name="targetLevel" value="6">6</label>
                <label class="rb"><input type="radio" name="targetLevel" value="7">7</label>
                <label class="rb"><input type="radio" name="targetLevel" value="8">8</label>
                <label class="rb"><input type="radio" name="targetLevel" value="9">9</label>
                <label class="rb"><input type="radio" name="targetLevel" value="10" checked>10</label>
                <label class="rb"><input type="radio" name="targetLevel" value="11">11</label>
                <label class="rb"><input type="radio" name="targetLevel" value="12">12</label>
            </div>

            <span class="label">Бажаний відтінок</span>
            <select name="targetDirection" id="targetDirection">
                <option value="0">.0 Натуральний</option>
                <option value="1" selected>.1 Попіл (Холодний)</option>
                <option value="2">.2 Перлина / Фіолет</option>
                <option value="3">.3 Золотистий</option>
                <option value="4">.4 Мідний</option>
                <option value="5">.5 Червоний</option>
                <option value="7">.7 Коричневий</option>
            </select>
        </div>

        <button type="button" id="calculateBtn" class="btn-danger" onclick="calculateProtocol()">ЗГЕНЕРУВАТИ ПРОТОКОЛ</button>
    </form>

    <div id="resultContainer"></div>

    <script src="core.js"></script>
    <script>
        // Блок ініціалізації (якщо потрібно)

        function render(s, input) {
            const container = document.getElementById('resultContainer');
            let h = '';

            // Візуальні попередження
            if (s.warnings && s.warnings.length) {
                h += s.warnings.map(w => `<div class="warning-box">${w}</div>`).join('');
            }

            // Рендер Фаз (Матрьошка)
            if (s.phases && s.phases.length) {
                s.phases.forEach((phase, index) => {
                    const isOpen = index === 0 ? 'open' : '';
                    h += `
                    <details ${isOpen}>
                        <summary>Фаза ${index + 1}: ${phase.phaseName}</summary>
                        <div class="phase-content">
                    `;
                    
                    if (phase.steps) {
                        phase.steps.forEach(step => {
                            h += `
                            <div class="step-card">
                                <div class="step-name">
                                    <span>${step.stepName}</span>
                                    ${step.reason ? `<span class="step-reason" onclick="alert('${step.reason.replace(/'/g, "\\'")}')">🧠 Чому?</span>` : ''}
                                </div>
                                <div class="step-action">${step.action}</div>
                                ${step.details ? `<div style="color:#aaa; font-size:0.85em; margin-top:6px; border-top:1px dashed #333; padding-top:4px;">${step.details}</div>` : ''}
                            </div>
                            `;
                        });
                    }
                    h += `</div></details>`;
                });
            }

            // Таймінг
            if (s.timing) {
                h += `
                <div class="card" style="text-align:center; border-color:var(--accent);">
                    <div style="font-size:0.9em; color:var(--text-dim);">Загальний час витримки</div>
                    <div style="font-size:1.8em; font-weight:800; color:var(--accent);">${s.timing} хв</div>
                </div>
                `;
            }

            container.innerHTML = h;
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
