<script>
// ===== PIGMENT MAP =====
const pigmentMap={'0':'Натуральний','1':'Голубий','11':'Інтенсивно-голубий','2':'Блідо-фіолетовий','3':'Жовтий (золотистий)','4':'Оранжевий','5':'Червоно-фіолетовий','6':'Червоний','7':'Фіолетовий','8':'Коричневий','9':'Синьо-зелений','16':'Фіолетово-голубий','32':'Жовто-фіолетовий','81':'Сріблястий','89':'Жемчужно-сандре'};

// ===== MIXTONE CALCULATOR =====
function calcMixtone(tLevel,tDir,processType,mass,condition){
    let pType=String(processType).toLowerCase();
    if(pType.includes('порошок')||pType.includes('powder'))return"Не додається (Нейтралізація на етапі тонування)";
    let color=pigmentMap[tDir]||"Коректор";
    if(tLevel==8&&['1','11','9','81'].includes(tDir))return"⚠️ ЗАБОРОНА: Пепел/Холод на 8-му рівні дасть ЗЕЛЕНЬ!";
    let rule11=11-tLevel;
    if(rule11<=0)return`Не потрібен (Рівень ${tLevel})`;
    let grams=(rule11/2.0)*(mass/30.0);
    grams=Math.round(grams*10)/10;
    const MAX_MIX=4.0*(mass/60.0);
    if(grams>MAX_MIX)grams=Math.round(MAX_MIX*10)/10;
    let resStr="";
    if(['пористі','сильно поврежденные'].includes(condition)&&['1','11','16','2','61','81','89'].includes(tDir)){
        grams=Math.round((grams*0.5)*10)/10;
        resStr=`${grams} гр (⚠️ Зменшено вдвічі) | ${color}`;
    }else{resStr=`${grams} гр | ${color}`;}
    if(pType.includes('тонування')||pType.includes('перманент')||tLevel>=9){
        if(grams>=MAX_MIX)resStr=`${grams} гр (ЖОРСТКИЙ ЛІМІТ) | ${color}`;
    }
    if(pType.includes('special blond')){
        let maxSB=Math.round((1.5*(mass/30.0))*10)/10;
        if(grams>maxSB){grams=maxSB;resStr=`${grams} гр (ЛІМІТ S.B.) | ${color}`;}
    }
    return resStr;
}

// ===== CHEMIST AGENT =====
class ChemistAgent{
    validate(p){
        const{baseType,lengthBaseType,targetLevel,rootLevel,lengthLevel,targetDirection,rStep,lStep,grey,porosity,elasticity}=p;
        // Еластичність 5 => повна відмова
        if(elasticity>=5)return{status:"BLOCKED",stages:[{title:"🚨 ФАТАЛЬНО: ВОЛОССЯ РВЕТЬСЯ",text:"Еластичність 5. Відмова від хімічної процедури. Тільки догляд."}]};
        // Хна + будь-яке освітлення
        if((baseType==='Прямий пігмент/Хна' && rStep>0) || (lengthBaseType==='Прямий пігмент/Хна' && lStep>0))return{status:"BLOCKED",stages:[{title:"🚨 ХІМІЧНИЙ КОНФЛІКТ: ХНА/ПРЯМИЙ ПІГМЕНТ",text:"Пудра запікає хну. Етап 1: Кислотна змивка + DELETE. Етап 2: М'яке стягування (пудра + 2% 1:3)."}],specialProtocol:"henna"};
        // Косметична база + освітлення фарбою
        if(((baseType==='Свіжа косметика'||baseType==='Накопичена косметика') && rStep>0) || ((lengthBaseType==='Свіжа косметика'||lengthBaseType==='Накопичена косметика') && lStep>0)){
            // Не блокуємо, але маркуємо що потрібна змивка
        }
        // Спецблонд обмеження
        if(targetLevel>=11){
            if(rootLevel<=5||lengthLevel<=5)return{status:"BLOCKED",stages:[{title:"🚨 SPECIAL BLOND ЗАБОРОНЕНО",text:"S.B. заборонено на базі нижче 6-го УГТ. Ризик брудного оранжевого фону."}]};
            if(porosity==='Пориста')return{status:"BLOCKED",stages:[{title:"🚨 S.B. + ПОРИСТІСТЬ",text:"Special Blond (12% оксид) заборонено на пористому волоссі. Ризик руйнування структури."}]};
            if(grey>30)return{status:"BLOCKED",stages:[{title:"🚨 S.B. + СИВИНА",text:`Special Blond заборонено при сивині > 30%. Поточна: ${grey}%. Працює тільки класичний перманент.`}]};
        }
        // Червоний + сивина

// ===== MASTER NODE =====
class MasterNode{
    constructor(){
        this.agents={chemist:new ChemistAgent(),math:runMathAgent,tech:new TechnologistAgent()};
    }
    process(input){
        const rStep=input.targetLevel-input.rootLevel;
        const lStep=input.targetLevel-input.lengthLevel;
        const decomp={...input,rStep,lStep};
        try{
            const chem=this.agents.chemist.validate(decomp);
            if(chem.status==="BLOCKED")return this.red(chem);
            const state=this.agents.math(decomp);
            if(state.status==="BLOCKED"||state.status==="FATAL_ERROR")return this.red(state);
            const tech=this.agents.tech.generateRegulation(decomp,state);
            state.plan=[...tech.protocol,...state.plan];
            state.underTheHood=[...(state.underTheHood||[]),...tech.underTheHood];
            return state;
        }catch(e){return this.red({status:"FATAL_ERROR",stages:[{title:"КРИТИЧНА ПОМИЛКА",text:e.message}]});}
    }
    red(s){return{...s,status:s.status||"FATAL_ERROR",warnings:s.warnings||[],diagnostics:s.diagnostics||[],plan:["ЗУПИНЕНО."],timing:0,rootRec:null,lenRec:null,underTheHood:[]};}
}

function render(s, input) {
    let h = '';

    // --- БЛОКУВАННЯ: Перекриває весь екран ---
    if (s.status === 'BLOCKED' || s.status === 'FATAL_ERROR') {
        (s.stages || []).forEach(st => {
            h += `<div class="blocked-full">
                <div class="blocked-title" style="color:#ff8fab;font-size:1.15em;font-weight:700;margin-bottom:10px">
                    🚨 ${st.title}
                </div>
                <div style="color:#ffb4c0;font-size:.95em;line-height:1.55">${st.text}</div>
            </div>`;
        });
        out.innerHTML = h;
        return;
    }

    // --- ПРОТОКОЛ «ОСТАННЯ НАДІЯ» --- (виводиться першим, якщо є)
    const lastHopePlan = (s.plan || []).filter(p =>
        p.includes('ОСТАННЯ НАДІЯ') || p.includes('КРОК 0')
    );
    if (lastHopePlan.length) {
        h += `<div class="lasthope-banner">
            <strong>🚨 ПРОТОКОЛ «ОСТАННЯ НАДІЯ» (Еластичність 4)</strong>
            ${lastHopePlan.map(p => `<div style="color:#ffe0b2;font-size:.92em;margin-top:5px">▸ ${p}</div>`).join('')}
        </div>`;
    }

    // --- ПОПЕРЕДЖЕННЯ ---
    if (s.warnings && s.warnings.length) {
        s.warnings.forEach(w => { h += `<div class="warn-box">⚠️ ${w}</div>`; });
    }

    // --- ДІАГНОСТИКА ---
    if (s.diagnostics && s.diagnostics.length) {
        s.diagnostics.forEach(d => { h += `<div class="diag-box">🔬 ${d}</div>`; });
    }

    // --- ХРОНОЛОГІЯ НАНЕСЕННЯ ---
    let stepNum = 0;

    // КРОК 1 — Mid-band (якщо є, ЗАВЖДИ першим)
    if (s.midRec) {
        stepNum++;
        h += stepCard({
            num: stepNum,
            type: 'midband',
            icon: '🟡',
            label: 'КРОК ' + stepNum + ' — MID-BAND (Холодна зона відростання)',
            note: '🧭 Нанести на відрослу зону, відступаючи 1–1.5 см від шкіри.',
            rec: s.midRec
        });
    }

    // КРОК 2 (або 1 якщо немає mid) — Корінь
    if (s.rootRec) {
        stepNum++;
        h += stepCard({
            num: stepNum,
            type: 'root',
            icon: '🔵',
            label: 'КРОК ' + stepNum + ' — КОРІНЬ (Гаряча прикоренева зона)',
            note: '🧭 Нанести на прикореневу зону (0–1.5 см від шкіри).',
            rec: s.rootRec
        });
    }

    // КРОК 3 (або 2) — Довжина
    if (s.lenRec) {
        stepNum++;
        h += stepCard({
            num: stepNum,
            type: 'length',
            icon: '🟢',
            label: 'КРОК ' + stepNum + ' — ДОВЖИНА',
            note: '',
            rec: s.lenRec
        });
    }

    // --- ЧАС ВИТРИМКИ ---
    if (s.timing) {
        h += `<div class="timing-box">⏱ Загальний час витримки<br>
              <span class="big">${s.timing} хв</span></div>`;
    }

    // --- РЕГЛАМЕНТ ДІЙ ---
    const protocolSteps = (s.plan || []).filter(p =>
        !p.includes('ОСТАННЯ НАДІЯ') && !p.includes('КРОК 0')
    );
    if (protocolSteps.length) {
        h += `<div class="protocol-box">
            <div style="color:#bb86fc;font-weight:700;margin-bottom:10px;font-size:1em">📋 РЕГЛАМЕНТ ДІЙ</div>
            ${protocolSteps.map((p, i) =>
                `<div class="protocol-step">
                    <span class="ps-num">${i + 1}.</span>
                    <span>${p}</span>
                </div>`
            ).join('')}
        </div>`;
    }

    // --- ЛОГІКА АЛГОРИТМУ ---
    if (s.underTheHood && s.underTheHood.length) {
        h += `<details style="margin-top:12px">
            <summary>[i] Логіка алгоритму</summary>
            ${s.underTheHood.map(u => `<div style="margin:4px 0;color:#aaa">• ${u}</div>`).join('')}
        </details>`;
    }

    out.innerHTML = h;
}

    const oxStr      = rec.ox     || '—';
    const massStr    = rec.mass   != null ? rec.mass + ' г' : '—';
    const ratioStr   = rec.ratio  || '—';

    let dyeDetailsHTML = '';
    if (rec.dyeDetails && rec.dyeDetails.length) {
        dyeDetailsHTML = `<div class="step-dye-details">
            ${rec.dyeDetails.map(dd =>
                `<div class="dd-row">
                    <span class="dd-name">▸ ${dd.name}</span>
                    <span class="dd-g">${dd.grams} г</span>
                </div>`
            ).join('')}
        </div>`;
    }

    const mixtoneHTML = rec.mixtone
        ? `<div class="step-mixtone">🎨 Мікстон: ${rec.mixtone}</div>`
        : '';

    const noteHTML = note
        ? `<div class="step-note">${note}</div>`
        : '';

    return `
    <div class="step-card ${type}">
        <div class="step-num">${icon} Крок ${num}</div>
        <div class="step-title">${label}</div>
        ${noteHTML}
        <div class="step-formula">
            <div class="step-formula-item">
                <div class="sfi-label">Процес</div>
                <div class="sfi-val" style="font-size:1em">${processStr}</div>
            </div>
            <div class="step-formula-item">
                <div class="sfi-label">Оксид</div>
                <div class="sfi-val ox-val">${oxStr}</div>
            </div>
            <div class="step-formula-item">
                <div class="sfi-label">Маса суміші</div>
                <div class="sfi-val mass-val big-val">${massStr}</div>
            </div>
            <div class="step-formula-item">
                <div class="sfi-label">Пропорція</div>
                <div class="sfi-val" style="font-size:1em">${ratioStr}</div>
            </div>
        </div>
        <div style="font-size:.88em;color:#aaa;margin-bottom:8px">
            <span style="color:#888">Барвник: </span>${dyeStr}
        </div>
        ${dyeDetailsHTML}
        ${mixtoneHTML}
    </div>`;
}

function recipeHTML(title,rec){
    let h=`<div class="recipe-card"><h4>${title}: ${rec.process}</h4>`;
    h+=`<div class="recipe-row"><span>Барвник:</span><span>${rec.dye}</span></div>`;
    if(rec.dyeDetails){
        rec.dyeDetails.forEach(dd=>{h+=`<div class="recipe-row" style="padding-left:12px;color:#bb86fc"><span>▸ ${dd.name}</span><span>${dd.grams} гр</span></div>`;});
    }
    h+=`<div class="recipe-row"><span>Оксид:</span><span>${rec.ox}</span></div>`;
    h+=`<div class="recipe-row"><span>Маса:</span><span>${rec.mass} гр</span></div>`;
    h+=`<div class="recipe-row"><span>Пропорція:</span><span>${rec.ratio}</span></div>`;
    if(rec.mixtone){h+=`<div class="mix-box">🎨 Мікстон: ${rec.mixtone}</div>`;}
    h+='</div>';
    return h;
}
</script>
</body>
</html>
